<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NEWSNET 24</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: #000;
    color: #fff;
    font-family: 'Oswald', Arial, sans-serif;
    overflow: hidden;
  }

  #screen {
    position: relative;
    width: 100%; height: 100vh;
    background: #000;
  }

  /* ───────── DEBUG / TIME-SKIP PANEL ───────── */
  #debugPanel {
    position: fixed;
    top: 10px; left: 10px;
    background: rgba(0,0,0,0.85);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 8px;
    padding: 10px 12px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    z-index: 10000;
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-width: 230px;
  }

  #debugPanel.collapsed .panel-body { display: none; }

  #debugPanel .panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    color: #0f0;
    letter-spacing: 1px;
  }

  #debugPanel label {
    color: rgba(255,255,255,0.6);
    font-size: 10px;
  }

  #debugPanel input[type="range"] {
    width: 100%;
  }

  #debugPanel input[type="checkbox"] {
    margin-right: 6px;
  }

  #debugPanel .row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  #debugPanel button {
    background: #222;
    color: #fff;
    border: 1px solid #444;
    border-radius: 4px;
    padding: 3px 8px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    cursor: pointer;
  }
  #debugPanel button:hover { background: #333; }

  #simTimeDisplay { color: #0ff; font-size: 14px; }

  /* ───────── PLAYER ───────── */
  #playerFrame {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    border: none;
    z-index: 1;
  }

  /* ───────── OFFLINE SCREEN ───────── */
  #offlineScreen {
    display: none;
    position: absolute; inset: 0;
    background: #000;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    z-index: 5;
  }

  #offlineScreen .bars {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 22%;
    display: flex;
  }
  #offlineScreen .bars div { flex: 1; }

  #offlineScreen .msg {
    font-size: 28px;
    letter-spacing: 6px;
    color: #ccc;
    text-align: center;
  }

  #offlineScreen .submsg {
    font-size: 14px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 3px;
    margin-top: 10px;
  }

  #offlineScreen canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    opacity: 0.08;
  }

  /* ───────── STANDBY / LATE-NIGHT SCREEN ───────── */
  #standbyScreen {
    display: none;
    position: absolute; inset: 0;
    background: linear-gradient(160deg,#06090f,#0c1322);
    align-items: center;
    justify-content: center;
    flex-direction: column;
    z-index: 5;
    gap: 18px;
  }

  #standbyScreen .net-id {
    font-size: 18px;
    letter-spacing: 6px;
    color: rgba(255,255,255,0.4);
  }

  #standbyScreen .standby-time {
    font-size: 80px;
    font-weight: 600;
    color: #fff;
  }

  #standbyScreen .standby-weather {
    font-size: 22px;
    color: #9fd8ff;
  }

  #standbyScreen .headline-ticker {
    margin-top: 10px;
    font-size: 15px;
    color: rgba(255,255,255,0.55);
    max-width: 70%;
    text-align: center;
    letter-spacing: 1px;
  }

  /* ───────── LOWER THIRD / BUG ───────── */
  #lowerThird {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    z-index: 50;
    display: flex;
    align-items: center;
    background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
    padding: 14px 20px;
    pointer-events: none;
  }

  #lowerThird .net-logo {
    background: #c1121f;
    color: #fff;
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 2px;
    padding: 6px 14px;
    margin-right: 14px;
  }

  #lowerThird .segment-label {
    font-size: 15px;
    color: #fff;
    letter-spacing: 1px;
    flex: 1;
  }

  #lowerThird .clock-mini {
    font-family: 'Share Tech Mono', monospace;
    font-size: 16px;
    color: #fff;
    margin-left: 14px;
  }

  #channelBug {
    position: absolute;
    top: 14px; right: 18px;
    font-size: 13px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.55);
    z-index: 50;
    pointer-events: none;
  }
</style>
</head>
<body>

<div id="screen">

  <iframe id="playerFrame" allow="autoplay; encrypted-media" allowfullscreen></iframe>

  <div id="offlineScreen">
    <canvas id="offlineStatic"></canvas>
    <div class="bars" id="offlineBars"></div>
    <div class="msg">WE'LL BE RIGHT BACK</div>
    <div class="submsg">NEWSNET 24 IS OFF THE AIR · BROADCAST RESUMES AT 5:00 AM</div>
  </div>

  <div id="standbyScreen">
    <div class="net-id">NEWSNET 24 · OVERNIGHT</div>
    <div class="standby-time" id="standbyTime">--:--</div>
    <div class="standby-weather" id="standbyWeather">Loading weather...</div>
    <div class="headline-ticker" id="standbyTicker">Loading headlines...</div>
  </div>

  <div id="channelBug">NEWSNET 24</div>

  <div id="lowerThird">
    <div class="net-logo" id="ntLogo">NEWSNET</div>
    <div class="segment-label" id="ntSegment">Loading schedule...</div>
    <div class="clock-mini" id="ntClock">--:--</div>
  </div>
</div>

<!-- DEBUG PANEL -->
<div id="debugPanel">
  <div class="panel-header" onclick="toggleDebug()">
    <span>⏱ TIME-SKIP DEBUG</span>
    <span id="debugToggleIcon">▾</span>
  </div>
  <div class="panel-body">
    <div class="row">
      <label>Use simulated time</label>
      <input type="checkbox" id="useSimTime" onchange="onSimToggle()">
    </div>
    <div id="simTimeDisplay">07:00</div>
    <input type="range" id="simSlider" min="0" max="1439" value="420" oninput="onSimSlide()">
    <div class="row">
      <button onclick="jumpTo(7,0)">7AM</button>
      <button onclick="jumpTo(10,0)">10AM</button>
      <button onclick="jumpTo(12,0)">12PM</button>
      <button onclick="jumpTo(18,0)">6PM</button>
      <button onclick="jumpTo(21,0)">9PM</button>
      <button onclick="jumpTo(3,0)">3AM</button>
    </div>
    <div class="row" style="font-size:10px;color:rgba(255,255,255,0.4)">
      <span id="currentSlotLabel">—</span>
    </div>
  </div>
</div>

<script>
/* ════════════════════════════════════════════
   CONFIG
════════════════════════════════════════════ */
const OWM_KEY = "69d758106d8333cb8e806b8d3bff6d15";
const LAT = 30.5083, LON = -97.6789;

const CHANNELS = {
  KVUE: "UCxXTyFekH99JnS3qaXIQW7A",
  BBC:  "UC16niRr50-MSBwiO3YDb3RA",
  FOX7: "UC5maSolHQX9er0BOxrzjMwA"
};

// Which channels feed which slot types — round-robins across sources for reliability/volume
const SLOT_SOURCES = {
  kvue_replay:     ["KVUE", "FOX7"],
  kvue_highlights: ["KVUE", "FOX7"],
  kvue_live:       ["KVUE", "FOX7"],
  kvue_extended:   ["KVUE", "FOX7"],
  kvue_recap:      ["KVUE", "FOX7"],
  kvue_late:       ["KVUE", "FOX7"],
  evening_preview: ["KVUE", "FOX7"],
  bbc:             ["BBC"]
};

const RSS_PROXY = "https://api.allorigins.win/raw?url=";

// Ads / filler video (90s-style or generic ad reel) — reused as filler when no fresh video found
const FILLER_AD_ID = "pQ2jtyVKWhc";

// Music video pool reused from the 90s build for the music blocks
const MUSIC_VIDEOS = [
  "sOnqjkJTMaA", "Zi_XLOBDo_Y", "YNzuiRuQNYY", "PIb6AZdTr-A",
  "t4QK8RxCAwo", "wp43OdtAAkM", "FTQbiNvZqaY", "SZQIfEN_p2A",
  "m3-hY-hlhBg", "xMaE6toi4mk"
];

/* ════════════════════════════════════════════
   SCHEDULE DEFINITION
   Each slot: { start: minutesFromMidnight, end, type, ... }
   type: "kvue_replay" | "kvue_highlights" | "bbc" | "music" |
         "evening_preview" | "kvue_live" | "kvue_extended" |
         "kvue_recap" | "kvue_late" | "overnight_calm" | "offline"
════════════════════════════════════════════ */
function M(h, m=0) { return h * 60 + m; }

const SCHEDULE = [
  { start: M(5),  end: M(7),  type: "bbc",              label: "BBC NATIONAL NEWS" },
  { start: M(7),  end: M(9),  type: "kvue_replay",       label: "MORNING NEWS REPLAY" },
  { start: M(9),  end: M(10), type: "kvue_highlights",   label: "MORNING HIGHLIGHTS LOOP" },
  { start: M(10), end: M(12), type: "bbc",               label: "BBC NATIONAL NEWS" },
  { start: M(12), end: M(16), type: "music",             label: "MUSIC VIDEOS" },
  { start: M(16), end: M(18), type: "evening_preview",   label: "EVENING PREVIEW · WEATHER & TRAFFIC" },
  { start: M(18), end: M(19), type: "kvue_live",         label: "KVUE EVENING NEWS" },
  { start: M(19), end: M(20), type: "kvue_extended",     label: "KVUE EXTENDED COVERAGE" },
  { start: M(20), end: M(21), type: "kvue_recap",        label: "NEWS RECAP" },
  { start: M(21), end: M(22), type: "kvue_late",         label: "KVUE LATE NEWS" },
  { start: M(22), end: M(24), type: "music",             label: "MUSIC VIDEOS" },
  { start: M(0),  end: M(2),  type: "overnight_calm",    label: "OVERNIGHT · WEATHER & HEADLINES" },
  { start: M(2),  end: M(3),  type: "overnight_calm",    label: "OVERNIGHT · WEATHER & HEADLINES" },
  { start: M(3),  end: M(5),  type: "offline",           label: "OFF AIR" },
];

function getSlot(minutes) {
  for (const s of SCHEDULE) {
    if (minutes >= s.start && minutes < s.end) return s;
  }
  return SCHEDULE[0];
}

/* ════════════════════════════════════════════
   TIME ENGINE (real or simulated)
════════════════════════════════════════════ */
let useSimTime = false;
let simMinutes = 420; // 7:00 AM default

function nowMinutes() {
  if (useSimTime) return simMinutes;
  const d = new Date();
  return d.getHours() * 60 + d.getMinutes();
}

function fmtTime(mins) {
  let h = Math.floor(mins / 60) % 24;
  const m = mins % 60;
  const ampm = h >= 12 ? "PM" : "AM";
  let h12 = h % 12; if (h12 === 0) h12 = 12;
  return `${h12}:${String(m).padStart(2,"0")} ${ampm}`;
}

/* ════════════════════════════════════════════
   DEBUG PANEL
════════════════════════════════════════════ */
function toggleDebug() {
  document.getElementById("debugPanel").classList.toggle("collapsed");
}

function onSimToggle() {
  useSimTime = document.getElementById("useSimTime").checked;
  evaluateSchedule(true);
}

function onSimSlide() {
  simMinutes = parseInt(document.getElementById("simSlider").value, 10);
  document.getElementById("simTimeDisplay").innerText = fmtTime(simMinutes);
  if (useSimTime) evaluateSchedule(true);
}

function jumpTo(h, m) {
  simMinutes = M(h, m);
  document.getElementById("simSlider").value = simMinutes;
  document.getElementById("simTimeDisplay").innerText = fmtTime(simMinutes);
  document.getElementById("useSimTime").checked = true;
  useSimTime = true;
  evaluateSchedule(true);
}

// Is a video "recent" (published within the last N hours)?
function isRecent(published, hoursWindow = 24) {
  if (!published) return false;
  const ageMs = Date.now() - published.getTime();
  return ageMs <= hoursWindow * 60 * 60 * 1000;
}

const playedVideoIds   = { KVUE: new Set(), BBC: new Set(), FOX7: new Set() };
const videoQueue       = { KVUE: [], BBC: [], FOX7: [] };
const lastFeedFetch     = { KVUE: 0, BBC: 0, FOX7: 0 };
const FEED_TTL_MS = 4 * 60 * 1000; // don't hammer the proxy more than every 4 min per channel

// Fetches the FULL feed (up to ~15 entries) so we have a real queue of fresh videos,
// not just "the one latest video" — this is what gives us volume instead of 1-per-hour.
async function fetchFeedEntries(channelKey) {
  const channelId = CHANNELS[channelKey];
  const feedUrl = `https://www.youtube.com/feeds/videos.xml?channel_id=${channelId}`;
  try {
    const res = await fetch(RSS_PROXY + encodeURIComponent(feedUrl));
    const xmlText = await res.text();
    const parser = new DOMParser();
    const xml = parser.parseFromString(xmlText, "text/xml");
    const entries = Array.from(xml.querySelectorAll("entry"));
    return entries.map(entry => {
      const videoId = entry.getElementsByTagNameNS("*", "videoId")[0]?.textContent
                    || entry.querySelector("videoId")?.textContent;
      const title = entry.querySelector("title")?.textContent || "Untitled";
      const published = entry.querySelector("published")?.textContent || null;
      return videoId ? { id: videoId, title, published: published ? new Date(published) : null } : null;
    }).filter(Boolean);
  } catch (e) {
    console.warn(`RSS fetch failed for ${channelKey}:`, e);
    return [];
  }
}

// Refill a channel's queue with any entries not yet played (within a generous 24h freshness window)
async function refillQueue(channelKey) {
  const now = Date.now();
  if (now - lastFeedFetch[channelKey] < FEED_TTL_MS && videoQueue[channelKey].length > 0) return;
  lastFeedFetch[channelKey] = now;

  const entries = await fetchFeedEntries(channelKey);
  const fresh = entries.filter(e =>
    !playedVideoIds[channelKey].has(e.id) && isRecent(e.published, 24)
  );
  // Queue oldest-first so playback feels like a real broadcast order
  fresh.sort((a, b) => (a.published?.getTime() || 0) - (b.published?.getTime() || 0));
  videoQueue[channelKey] = fresh;
}

// Pulls the next video to play for a given slot, trying each source in SLOT_SOURCES order.
// Returns { id, title, source } or null if every source's queue is empty (triggers ad fallback).
async function getNextVideoForSlot(slotType) {
  const sources = SLOT_SOURCES[slotType] || ["KVUE"];
  for (const src of sources) {
    await refillQueue(src);
    if (videoQueue[src].length > 0) {
      const vid = videoQueue[src].shift();
      playedVideoIds[src].add(vid.id);
      // Cap memory of played IDs so very long sessions don't leak forever
      if (playedVideoIds[src].size > 200) {
        const arr = Array.from(playedVideoIds[src]);
        playedVideoIds[src] = new Set(arr.slice(-100));
      }
      return { id: vid.id, title: vid.title, source: src };
    }
  }
  return null; // nothing fresh anywhere — caller falls back to ads
}

/* ════════════════════════════════════════════
   PLAYER CONTROL
════════════════════════════════════════════ */
const iframe = document.getElementById("playerFrame");

function playYouTube(videoId, opts = {}) {
  const params = new URLSearchParams({
    autoplay: "1",
    controls: opts.controls ?? "1",
    modestbranding: "1",
    rel: "0"
  });
  iframe.src = `https://www.youtube.com/embed/${videoId}?${params.toString()}`;
  iframe.style.display = "block";
  document.getElementById("offlineScreen").style.display = "none";
  document.getElementById("standbyScreen").style.display = "none";
}

function stopPlayer() {
  iframe.src = "";
  iframe.style.display = "none";
}

function showOffline() {
  stopPlayer();
  document.getElementById("offlineScreen").style.display = "flex";
  document.getElementById("standbyScreen").style.display = "none";
}

function showStandby() {
  stopPlayer();
  document.getElementById("offlineScreen").style.display = "none";
  document.getElementById("standbyScreen").style.display = "flex";
}

/* ════════════════════════════════════════════
   MUSIC ROTATION
════════════════════════════════════════════ */
let musicIdx = Math.floor(Math.random() * MUSIC_VIDEOS.length);
function playNextMusic() {
  musicIdx = (musicIdx + 1) % MUSIC_VIDEOS.length;
  playYouTube(MUSIC_VIDEOS[musicIdx]);
}

/* ════════════════════════════════════════════
   CORE SCHEDULE EVALUATOR
   Runs every cycle: figure out slot, decide what plays
════════════════════════════════════════════ */
let currentSlotKey = null;
let pollTimer = null;
let videoEndTimer = null;

function clearTimers() {
  clearTimeout(pollTimer);
  clearTimeout(videoEndTimer);
}

async function evaluateSchedule(force = false) {
  const mins = nowMinutes();
  const slot = getSlot(mins);
  const slotKey = `${slot.start}-${slot.end}-${slot.type}`;

  document.getElementById("ntClock").innerText = fmtTime(mins);
  document.getElementById("currentSlotLabel").innerText = `Slot: ${slot.label}`;

  if (slotKey === currentSlotKey && !force) {
    // Same slot — just keep clock updated, don't restart content
    return;
  }

  currentSlotKey = slotKey;
  clearTimers();
  newsBlockActiveStop(); // ensure any prior news chain stops before switching content types
  document.getElementById("ntSegment").innerText = slot.label;

  switch (slot.type) {
    case "offline":
      runOffline();
      break;
    case "overnight_calm":
      runOvernightCalm();
      break;
    case "music":
      runMusic();
      break;
    case "bbc":
    case "kvue_replay":
    case "kvue_highlights":
    case "kvue_live":
    case "kvue_extended":
    case "kvue_recap":
    case "kvue_late":
    case "evening_preview":
      runNewsChannel(slot.type, slot.label);
      break;
    default:
      runOfflineFallback();
  }
}

/* ── OFFLINE ── */
function runOffline() {
  showOffline();
}

/* ── OVERNIGHT CALM: ads + weather/time/headlines ── */
async function runOvernightCalm() {
  showStandby();
  updateStandby();
  // loop ads/music softly in background not needed; standby screen IS the content
  // refresh ticker periodically
  videoEndTimer = setTimeout(() => evaluateSchedule(), 5 * 60 * 1000);
}

async function updateStandby() {
  loadWeatherInto("standbyWeather");
  await refillQueue("KVUE");
  const next = videoQueue["KVUE"][0];
  const el = document.getElementById("standbyTicker");
  el.innerText = next ? `LATEST: ${next.title}` : "Standing by for the next update.";
}

/* ── MUSIC BLOCK ── */
function runMusic() {
  playNextMusic();
  // ~4.5 min per video, then advance — re-check schedule each time in case slot changed
  videoEndTimer = setTimeout(() => {
    evaluateSchedule(); // re-check if still in music slot
    if (currentSlotKey && currentSlotKey.includes("music")) playNextMusic();
  }, 4.5 * 60 * 1000);
}

/* ── NEWS BLOCK — chains multiple videos from the queue, falls back to ads only when truly empty ── */
const AVG_NEWS_CLIP_MS = 6 * 60 * 1000; // assume ~6 min per segment if we can't read duration
let newsBlockActive = false;
function newsBlockActiveStop() { newsBlockActive = false; }

async function runNewsChannel(slotType, label) {
  document.getElementById("ntSegment").innerText = label;
  newsBlockActive = true;
  await playNextNewsItem(slotType);
}

async function playNextNewsItem(slotType) {
  if (!newsBlockActive) return;

  const item = await getNextVideoForSlot(slotType);

  if (item) {
    playYouTube(item.id);
    document.getElementById("ntLogo").innerText = item.source;
    document.getElementById("ntSegment").innerText = item.title.slice(0, 80);
  } else {
    // Every source's queue is dry — fill with ads rather than repeat
    playYouTube(FILLER_AD_ID, { controls: "0" });
    document.getElementById("ntLogo").innerText = "ADS";
    document.getElementById("ntSegment").innerText = "Commercial break — more news shortly";
  }

  // Chain to the next item automatically, re-checking the schedule hasn't moved on
  videoEndTimer = setTimeout(() => {
    if (newsBlockActive) playNextNewsItem(slotType);
  }, AVG_NEWS_CLIP_MS);

  // Also opportunistically top up queues in the background every cycle
  for (const src of SLOT_SOURCES[slotType] || []) refillQueue(src);
}

function runOfflineFallback() {
  playYouTube(FILLER_AD_ID, { controls: "0" });
}

/* ════════════════════════════════════════════
   WEATHER
════════════════════════════════════════════ */
async function loadWeatherInto(elId) {
  try {
    const res = await fetch(
      `https://api.openweathermap.org/data/2.5/weather?lat=${LAT}&lon=${LON}&units=imperial&appid=${OWM_KEY}`
    );
    const d = await res.json();
    const el = document.getElementById(elId);
    if (el) el.innerText = `${Math.round(d.main.temp)}°F · ${d.weather[0].main}`;
  } catch (e) {
    const el = document.getElementById(elId);
    if (el) el.innerText = "Weather unavailable";
  }
}

/* ════════════════════════════════════════════
   OFFLINE STATIC ANIMATION
════════════════════════════════════════════ */
const ostaticCanvas = document.getElementById("offlineStatic");
const octx = ostaticCanvas.getContext("2d");
function resizeOstatic() { ostaticCanvas.width = innerWidth; ostaticCanvas.height = innerHeight; }
window.addEventListener("resize", resizeOstatic);
resizeOstatic();

function drawOfflineStatic() {
  if (document.getElementById("offlineScreen").style.display !== "flex") return;
  const w = ostaticCanvas.width, h = ostaticCanvas.height;
  const img = octx.createImageData(w, h);
  for (let i = 0; i < img.data.length; i += 4) {
    const v = Math.random() > 0.5 ? 255 : 0;
    img.data[i] = img.data[i+1] = img.data[i+2] = v;
    img.data[i+3] = 255;
  }
  octx.putImageData(img, 0, 0);
  requestAnimationFrame(drawOfflineStatic);
}
drawOfflineStatic();

// Color bars for offline screen
const obars = document.getElementById("offlineBars");
["#c0c0c0","#c0c000","#00c0c0","#00c000","#c000c0","#c00000","#0000c0"].forEach(c => {
  const d = document.createElement("div");
  d.style.background = c;
  obars.appendChild(d);
});

/* ════════════════════════════════════════════
   CLOCK + INIT LOOP
════════════════════════════════════════════ */
function tickClock() {
  const mins = nowMinutes();
  document.getElementById("ntClock").innerText = fmtTime(mins);
  document.getElementById("standbyTime").innerText = fmtTime(mins);
}
setInterval(tickClock, 1000);
tickClock();

// Re-evaluate the schedule every 30s (catches slot transitions in real-time mode)
setInterval(() => evaluateSchedule(), 30 * 1000);

// Initial kick-off
evaluateSchedule(true);
</script>
</body>
</html>
